<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Channel Website</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:#ff0000;
color:white;
text-align:center;
padding:20px;
}

header h1{
margin:0;
}

.container{
width:90%;
margin:auto;
margin-top:30px;
}

.video{
text-align:center;
margin-bottom:30px;
}

iframe{
width:100%;
max-width:700px;
height:400px;
border:none;
}

.subscribe{
text-align:center;
margin:30px;
}

.subscribe a{
background:#ff0000;
color:white;
padding:12px 25px;
text-decoration:none;
font-size:18px;
border-radius:5px;
}

.subscribe a:hover{
background:#cc0000;
}

footer{
background:#222;
color:white;
text-align:center;
padding:15px;
margin-top:40px;
}

</style>

</head>

<body>

<header>
<h1>My YouTube Channel</h1>
<p>Welcome to my official website</p>
</header>

<div class="container">

<div class="video">

<h2>Latest Video</h2>

<iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>

</div>

<div class="subscribe">

<a href="https://www.youtube.com" target="_blank">Subscribe My Channel</a>

</div>

</div>

<footer>

<p>© 2026 My YouTube Channel</p>

</footer>

</body>
</html>
